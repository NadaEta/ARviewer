<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Furniture AR</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #f0f0f0; }
    model-viewer {
      width: 100vw;
      height: 100vh;
    }
    .controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      padding: 12px 20px;
      border-radius: 50px;
      z-index: 100;
      display: flex;
      gap: 12px;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <model-viewer id="viewer"
    src=Night-Stand.glb"   <!-- Temporary test model -->
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-placement="floor"
    camera-controls
    shadow-intensity="2"
    exposure="0.8"
    environment-intensity="0.7"
    auto-rotate
    loading="eager"
  >
    <button slot="ar-button" style="background:white; color:black; padding:14px 28px; border-radius:50px; font-weight:bold; font-size:16px;">
      👁️ View in Your Room
    </button>
  </model-viewer>

  <!-- Color Controls -->
  <div class="controls">
    <button onclick="changeColor(0.3, 0.2, 0.1)">Brown</button>
    <button onclick="changeColor(1, 1, 1)">White</button>
    <button onclick="changeColor(0.1, 0.1, 0.1)">Black</button>
    <button onclick="changeColor(0.6, 0.1, 0.1)">Red</button>
  </div>

<script>
  const modelViewer = document.getElementById('viewer');

  function changeColor(r, g, b) {
    modelViewer.model.materials.forEach(material => {
      if (material.pbrMetallicRoughness) {
        material.pbrMetallicRoughness.baseColorFactor = [r, g, b, 1];
      }
    });
  }
</script>

</body>
</html>
